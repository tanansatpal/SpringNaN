spring.application.name=demo1
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/demo1}

# Optional PostgreSQL settings if you add JPA later
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demo1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:demo1}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:demo1}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.secret=change-this-to-a-long-random-secret-key-at-least-32-chars
app.jwt.expiration-ms=86400000

app.weather.latitude=52.52
app.weather.longitude=13.41

app.claude.api-key=YOUR_CLAUDE_API_KEY_HERE
app.claude.base-url=https://api.anthropic.com
app.claude.sentiment-model=claude-haiku-4-5
app.claude.reply-model=claude-sonnet-4-6